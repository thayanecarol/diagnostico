<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Diagnóstico Lei 14.133/2021</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

  <!-- Recharts CDN -->
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
</head>

<body class="bg-slate-50">
  <div id="root"></div>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().signInAnonymously();

const { useState, useEffect } = React;
const { PieChart, Pie, Cell, Tooltip, Legend, BarChart, Bar, XAxis, YAxis, CartesianGrid } = Recharts;

function App() {
  const [view, setView] = useState("form");
  const [responses, setResponses] = useState([]);
  const [nome, setNome] = useState("");
  const [setor, setSetor] = useState("");
  const [resposta, setResposta] = useState("");

  useEffect(() => {
    db.collection("survey_responses").onSnapshot(snapshot => {
      setResponses(snapshot.docs.map(doc => doc.data()));
    });
  }, []);

  function enviar() {
    db.collection("survey_responses").add({
      dificuldade: resposta,
      timestamp: new Date()
    });

    db.collection("survey_completions").add({
      nome,
      setor,
      timestamp: new Date()
    });

    setView("dashboard");
  }

  if(view === "form") {
    return (
      <div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Diagnóstico Lei 14.133</h1>

        <label class="block mb-2">Nome:</label>
        <input class="w-full border p-2 mb-4"
          value={nome} onChange={e=>setNome(e.target.value)} />

        <label class="block mb-2">Setor:</label>
        <input class="w-full border p-2 mb-4"
          value={setor} onChange={e=>setSetor(e.target.value)} />

        <label class="block mb-2">Nível de dificuldade:</label>
        <select class="w-full border p-2 mb-4"
          onChange={e=>setResposta(e.target.value)}>
          <option value="">Selecione</option>
          <option>Baixa</option>
          <option>Média</option>
          <option>Alta</option>
        </select>

        <button onclick={enviar}
          class="bg-blue-600 text-white px-4 py-2 rounded">
          Enviar
        </button>
      </div>
    );
  }

  const dados = [
    {name:"Baixa", value: responses.filter(r=>r.dificuldade==="Baixa").length},
    {name:"Média", value: responses.filter(r=>r.dificuldade==="Média").length},
    {name:"Alta", value: responses.filter(r=>r.dificuldade==="Alta").length}
  ];

  return (
    <div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-6">Relatório</h2>
      <PieChart width={400} height={300}>
        <Pie data={dados} dataKey="value" cx="50%" cy="50%" outerRadius={100} label>
          {dados.map((entry, index) => (
            <Cell key={index} fill={["#3b82f6","#facc15","#ef4444"][index]} />
          ))}
        </Pie>
        <Tooltip/>
        <Legend/>
      </PieChart>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
